name: Build Release

on:
     push:
          tags:
             - 'v*'
     workflow_dispatch:

concurrency:
     group: release-${{ github.ref }}
     cancel-in-progress: false

permissions:
     contents: write

jobs:
     build_release:
          runs-on: ubuntu-latest
          timeout-minutes: 30

          steps:
             - uses: actions/checkout@v4

             - name: Setup Bun
               uses: oven-sh/setup-bun@v2
               with:
                    bun-version: '1'

             - name: Setup Go
               uses: actions/setup-go@v5
               with:
                    go-version: 'stable'
                    cache-dependency-path: src/backend/go.sum

             - name: Update version from tag
               run: |
                    TAG_NAME=${{ github.ref_name }}

                    if [[ $TAG_NAME == v* ]]; then
                      VERSION=${TAG_NAME#v}
                      echo "Updating package.json to version $VERSION"
                      sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
                    else
                      VERSION=$(grep -Po '"version"\s*:\s*"\K[^"]+' package.json)
                    fi
                    
                    echo "PACKAGE_VERSION=${VERSION}" >> $GITHUB_ENV

             - name: Cache dependencies
               uses: actions/cache@v4
               with:
                    path: |
                         ~/.bun/install/cache
                         ~/.cache/electron
                         ~/.cache/electron-builder
                    key: ${{ runner.os }}-deps-${{ hashFiles('bun.lock', 'package.json') }}
                    restore-keys: |
                         ${{ runner.os }}-deps-

             - name: Install system dependencies (Linux)
               run: |
                    sudo apt-get update
                    sudo apt-get install -y --no-install-recommends \
                      rpm libarchive-tools libgtk-3-dev libayatana-appindicator3-dev
               env:
                    DEBIAN_FRONTEND: noninteractive

             - name: Install dependencies
               run: bun install --frozen-lockfile

             - name: Build App
               run: bun run build:all
               env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

             - name: Zip linux-unpacked
               run: |
                    zip -r "dist/linux-wallpaperengine-gui.zip" dist/linux-unpacked

             - name: Upload Release Assets
               uses: softprops/action-gh-release@v2
               with:
                    generate_release_notes: true
                    files: |
                         dist/*.AppImage
                         dist/*.deb
                         dist/*.rpm
                         dist/*.zip
                         dist/latest-linux.yml
               env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
